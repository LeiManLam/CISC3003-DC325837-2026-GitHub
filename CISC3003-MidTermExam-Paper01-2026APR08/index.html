<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dc325837 Lei Man Lam</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <!-- Sign Up Panel (Left) -->
        <div class="panel left-panel" id="signUpPanel">
            <div class="content">
                <h1>Hello, Again!</h1>
                <div class="illustration">
                    <img src="images/website_7376495.png" alt="User Icon">
                </div>
                <p>Log in to stay connected with us</p>
                <button class="btn-transparent" id="signInBtn">SIGN IN</button>
            </div>
        </div>

        <!-- Sign Up Form (Right) -->
        <div class="form-panel right-panel-form" id="signUpForm">
            <h2>Join Us</h2>
            <div class="social-icons">
                <a href="#" class="social-icon">f</a>
                <a href="#" class="social-icon">G+</a>
                <a href="#" class="social-icon">in</a>
            </div>
            <p class="form-subtitle">Use your email to sign up</p>
            <form id="registerForm">
                <input type="text" placeholder="Full Name" class="input-field" id="fullName" required>
                <input type="email" placeholder="Email" class="input-field" id="signUpEmail" required>
                <input type="password" placeholder="Create Password" class="input-field input-focus" id="signUpPassword" required>
                <button type="submit" class="btn-primary">REGISTER</button>
            </form>
        </div>

        <!-- Log In Form (Left) -->
        <div class="form-panel left-panel-form" id="logInForm">
            <h2>Log In</h2>
            <div class="social-icons">
                <a href="#" class="social-icon">f</a>
                <a href="#" class="social-icon">G+</a>
                <a href="#" class="social-icon">in</a>
            </div>
            <p class="form-subtitle">Use your account to sign in</p>
            <form id="loginForm">
                <input type="email" placeholder="Email" class="input-field" id="loginEmail" required>
                <input type="password" placeholder="Password" class="input-field" id="loginPassword" required>
                <a href="#" class="forgot-password">Forgot Password?</a>
                <button type="submit" class="btn-primary">SIGN IN</button>
            </form>
        </div>

        <!-- Welcome Panel (Right) -->
        <div class="panel right-panel" id="welcomePanel">
            <div class="content">
                <h1>Welcome!</h1>
                <div class="illustration">
                    <img src="images/unsecure_10399884.png" alt="Secure Icon">
                </div>
                <p>Enter your details to start your journey</p>
                <button class="btn-transparent" id="signUpBtn">SIGN UP</button>
            </div>
        </div>
    </div>

    <footer>
        CISC3003 Web Programming: Dc325837 Lei Man Lam 2026
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
